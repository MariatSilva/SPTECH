<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHILE</title>
</head>
<body>  
    <div id="resultado"></div>
    
</body>
<script>
    let contador = 0;

    while(contador<=9){
        resultado.innerHTML += `O contador é: ${contador}<br>`
        contador ++;
        
    }
    resultado.innerHTML +=`<br>agr com for: <br><br>`

    for (let i = 0; i <=9; i ++){
         resultado.innerHTML += `O i é: ${i}<br>`
    }
</script>
</html>
