<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão laço</title>
</head>
<body>
    <input type="text" id="ipt_valor">    
    <br>
    <button onclick="mostrar()">Ver cafés</button>
    <br>
    <div id="resultado"></div>
</body>
<script>
    function mostrar(){
        let qtdCafes = Number (ipt_valor.value);
        let fraseFinal = "";

        for (let i = 0; i<qtdCafes; i++){
           fraseFinal += `Mostrando o café ${i + 1} ☕<br>`
        }

        resultado.innerHTML = fraseFinal;
    }
</script>
</html>
