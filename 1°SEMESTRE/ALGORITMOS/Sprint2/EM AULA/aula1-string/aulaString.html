<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_texto">
    <button onclick="validar()">Validar Frase</button>
</body>
<script>
    function validar(){
        let frase = (ipt_texto.value);

        let contem_bob_inicio = frase.startsWith("Bob");
        console.log(`O texto começa com Bob? ${contem_bob_inicio}`);

        let contem_bob_fim = frase.endsWith('Bob');
        console.log(`O texto termina com Bob? ${contem_bob_fim}`);
      
        let cpf_limpo = frase.trim();
        console.log(`Exemplo CPF tratado: ${cpf_limpo}`);

        console.log(`Exemplo original: ${frase}`);

        let tamanho_frase = frase.length
        console.log(`O tamanho do texto é ${tamanho_frase}`)

        let primeira_letra = frase[0];
        console.log(`Primeira letra da frase ${primeira_letra}`)
        
        let ultima_letra = frase[tamanho_frase - 1];
        console.log(`Última letra: ${ultima_letra}`)

        let indice_oi = frase.indexOf("oi");
        console.log(`A palavra oi foi encontrada na posição: ${indice_oi}`)
        if(indice_oi== -1){
            console.log(`Não tem oi na sua frase`)
        }else{
            console.log(`Tem oi na sua frase`)
        }


        let frase_caixa_alta = frase.toUpperCase();
        console.log(`Frase gritando: ${frase_caixa_alta}`);

        let frase_caixa_baixa = frase.toLowerCase();
        console.log(`Frase sussurrando ${frase_caixa_baixa}`)

        


        
       // let procurar = "_"
        //frase.replace(procurar, ".")
        
    }
</script>
</html>
