<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Sanji</title>
</head>

<body>
    <label for="">Cadastrar Estoque de Comidas</label>
    <input type="text" id="ipt_comida">
    <br>
    <button onclick="cadastrarComida()">Cadastrar</button>
    <button onclick="verificarQuantidade()">Verificar Quantidade</button>
    <div id="resultado"></div>
    <br><br>
    <label for="">Pesquise o nome de uma comida</label>
    <input type="text" id="ipt_pesquisa_comida">
    <br>
    <button onclick="pesquisar_comida()">Pesquisar</button>
    <button onclick="exibir_estoque()">Exibir Estoque</button>
    <div id="resultado_pesquisa"></div>
</body>
<script>

    let comida_geral_navio = [];

    function cadastrarComida() {
        let comida = (ipt_comida.value);

        comida_geral_navio.push(comida);

        console.log(comida_geral_navio)
    }


    function verificarQuantidade() {
        resultado.innerHTML = ``;
        let qtd_comida = comida_geral_navio.length;


        if (qtd_comida < 3) {
            resultado.innerHTML += `Desse jeito, o Luffy devora até o navio`
        } else if (qtd_comida >= 3 && qtd_comida <= 7) {
            resultado.innerHTML += `O comilão do Luffy não vai deixar sobrar nenhuma comida`
        } else if (qtd_comida >= 8 && qtd_comida <= 10) {
            resultado.innerHTML += `Assim, talvez sobre um pouco para a tripulação`
        } else {
            resultado.innerHTML += `Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami!`
        }
    }


    function pesquisar_comida() {
        let qtd_comida_encontradas = 0;
        let buscarComida = (ipt_pesquisa_comida.value)
        let existeComida = comida_geral_navio.includes(buscarComida);



        if (!existeComida) {
            resultado_pesquisa.innerHTML = `Alguém vai ter que comprar ${buscarComida}, tá fazendo falta...`
        }

        else {
            for (let i = 0; i < comida_geral_navio.length; i++) {
                if (comida_geral_navio[i] == buscarComida) {
                    qtd_comida_encontradas++;
                }
            }
            resultado_pesquisa.innerHTML = `Temos a comida ${buscarComida} e há ${qtd_comida_encontradas} unidade(s) dela"`
        }

    }

    function exibir_estoque() {
        let totalComida = [];

        for (let i = 0; i < comida_geral_navio.length; i++) {
            if (!totalComida.includes(comida_geral_navio)) {
                totalComida.push(comida_geral_navio[i]);
            }

        }
        console.log(totalComida)

    
    }
</script>

</html>
