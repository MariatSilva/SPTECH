<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Sanji</title>
</head>

<body>

    <h2>Cadastre e verifique a quantidade de comida</h2>
    <label for="">Cadastrar Estoque de Comidas</label>
    <input type="text" id="ipt_comida">
    <br>
    <button onclick="cadastrarComida()">Cadastrar</button>
    <button onclick="verificarQuantidade()">Verificar Quantidade</button>
    <div id="resultado"></div>


    <h2>Pesquise uma comida específica ou veja o seu estoque</h2>
    <label for="">Pesquise o nome de uma comida</label>
    <input type="text" id="ipt_pesquisa_comida">
    <br>
    <button onclick="pesquisar_comida()">Pesquisar</button>
    <button onclick="exibir_estoque()">Exibir Estoque</button>
    <div id="resultado_pesquisa"></div>
    <div id="exibir_estoque_resultado"></div>


    <h2>Atualize uma comida</h2>
    <label for="">Digite o nome da comida que você quer alterar:</label>
    <input type="text" id="ipt_nome_atual_comida">
    <br>
    <label for="">Digite para qual nome você quer alterar:</label>
    <input type="text" id="ipt_nome_para_alteracao">
    <br>
    <button onclick="alterar_nome()">Alterar Nome</button>
    <div id="resultado_comida_alterada"></div>


    <h2>Delete uma comida</h2>
    <label for="">Digite o nome da comia a ser deletada:</label>
    <input type="text" id="ipt_comida_para_remover">
    <br>
    <button onclick="remover_comida()">Remover Comida</button>
    <div id="resultado_remover_comida"></div>

</body>
<script>

    let estoque = [];

    function cadastrarComida() {
        let comida = (ipt_comida.value);

        estoque.push(comida);

        console.log(estoque)
    }


    function verificarQuantidade() {
        resultado.innerHTML = ``;
        let qtd_comida = estoque.length;


        if (qtd_comida < 3) {
            resultado.innerHTML += `Desse jeito, o Luffy devora até o navio`
        } else if (qtd_comida >= 3 && qtd_comida <= 7) {
            resultado.innerHTML += `O comilão do Luffy não vai deixar sobrar nenhuma comida`
        } else if (qtd_comida >= 8 && qtd_comida <= 10) {
            resultado.innerHTML += `Assim, talvez sobre um pouco para a tripulação`
        } else {
            resultado.innerHTML += `Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami!`
        }
    }


    function pesquisar_comida() {
        let qtd_comida_encontradas = 0;
        let buscarComida = (ipt_pesquisa_comida.value)
        let existeComida = estoque.includes(buscarComida);



        if (!existeComida) {
            resultado_pesquisa.innerHTML = `Alguém vai ter que comprar ${buscarComida}, tá fazendo falta...`
        }

        else {
            for (let i = 0; i < estoque.length; i++) {
                if (estoque[i] == buscarComida) {
                    qtd_comida_encontradas++;
                }
            }
            resultado_pesquisa.innerHTML = `Temos a comida ${buscarComida} e há ${qtd_comida_encontradas} unidade(s) dela"`
        }

    }

    function exibir_estoque() {
        exibir_estoque_resultado.innerHTML = ``
        let totalComida = [];

        for (let i = 0; i < estoque.length; i++) {
            if (!totalComida.includes(estoque[i])) {
                totalComida.push(estoque[i]);
            }
        }

        for (let i = 0; i < totalComida.length; i++) {

            let contadorComida = 0;
            for (let j = 0; j < estoque.length; j++) {
                if (totalComida[i] == estoque[j]) {
                    contadorComida++
                }
            }
            exibir_estoque_resultado.innerHTML += `${totalComida[i]} (${contadorComida} ${contadorComida > 1 ? "unidades" : "unidade"})<br>`
        }
        console.log(totalComida)
    }

    function alterar_nome() {
        let nomeAtualComida = ipt_nome_atual_comida.value;
        let nomeParaAlteracao = ipt_nome_para_alteracao.value;
        let encontrou = false;

        for (let i = 0; i < estoque.length; i++) {
            if (estoque[i] == (nomeAtualComida)) {
                estoque[i] = nomeParaAlteracao;
                encontrou = true;
            }
        }
        if (encontrou) {
            resultado_comida_alterada.innerHTML = `A comida ${nomeAtualComida} foi alterada para ${nomeParaAlteracao}`;
        } else {
            resultado_comida_alterada.innerHTML = `A comida ${nomeAtualComida} não foi encontrada no estoque`
        }
    }

    function remover_comida() {
        resultado_remover_comida.innerHTML = ``
        let nomeRemoverComida = ipt_comida_para_remover.value
        let encontrou = false;

        if (estoque.indexOf(nomeRemoverComida) >= 0) {


            for (let i = 0; i < estoque.length; i++) {
                if (estoque[i] == nomeRemoverComida) {
                    estoque.splice(i, 1);
                    resultado_remover_comida.innerHTML = `A comida ${nomeRemoverComida} foi removida do estoque.`
                    i--
                }
            }
        } else {
            resultado_remover_comida.innerHTML = `A comida ${nomeRemoverComida} não está no estoque.`
        }
    }
</script>

</html>
