<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>

<body>
    <label for="">Escolha um número:</label>
    <select name="Múltiplos" id="numEscolha">
        <option value="numero2">2</option>
        <option value="numero3">3</option>
        <option value="numero4">4</option>
        <option value="numero5">5</option>
        <option value="numero6">6</option>
        <option value="numero7">7</option>
        <option value="numero8">8</option>
        <option value="numero9">9</option>
    </select>
    <br>
    <label for="">Digite até que número você quer multiplicar:</label>
    <input type="number" id="ipt_multiplicador">
    <br>
    <button onclick="tabuada()">Ver Tabuada</button>
    <br><br>
    <div id="resultado"></div>
</body>


<script>
    function tabuada() {
        resultado.innerHTML = ``
        let multiplicador = Number(ipt_multiplicador.value);
        let num = Number(numEscolha.value.replace("numero", ""));
        let contador = 1;


        while (contador <= multiplicador) {
            resultadoConta = contador * num;
            if (contador % 2 == 0) {
                resultado.innerHTML += `<span style="color:blue;">${num} * ${contador} = ${resultadoConta}</span><br>`
            } else {
                resultado.innerHTML += `<span style="color:red;">${num} * ${contador} = ${resultadoConta}</span><br>`

            }
            contador++
        }
    }

</script>

</html>
