<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <label for="">Digite quantas voltas o carro dará em uma corrida:</label>
    <input type="number" id="ipt_qtd_voltas">
    <br>
    <button onclick="iniciarCorrida()">Iniciar corrida!</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function iniciarCorrida (){
        let qtdCorridas = Number (ipt_qtd_voltas.value);
        resultado.innerHTML = ``;
        let contador = 1;
        
        while (contador <= qtdCorridas){
            resultado.innerHTML += `Carro dando a ${contador}ª volta<br>`
            contador++
        }
        resultado.innerHTML += `Corrida finalizada!`;
    }
</script>
</html>
