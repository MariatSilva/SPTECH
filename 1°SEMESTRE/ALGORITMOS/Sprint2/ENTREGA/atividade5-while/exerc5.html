<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <button onclick="numCabalistico()">Números cabalísticos</button>
    <br><br>
    <div id="resultado"></div>
</body>

<script> 
    function numCabalistico(){
        contador = 1;

        while (contador <=30){
            if (contador == 3 || contador == 4 || contador == 7 || contador == 10 || contador == 12){
                contador ++;
            }else{
                resultado.innerHTML += `${contador}<br>`
                contador ++;
            }
        }
    }
</script>
</html>
