<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <label for="">Digite o número de início:</label>
    <input type="number" id="ipt_num_inicio">
    <br>
    <label for="">Digite o número final:</label>
    <input type="number" id="ipt_num_final">
    <br>
    <button onclick="analisarPares()">S2 Pares</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function analisarPares(){
        let numInicial = Number (ipt_num_inicio.value);
        let numFinal = Number (ipt_num_final.value);
        let contador = numInicial;
        resultado.innerHTML = ``;

        while (contador <=numFinal){
            if (contador %2 == 0){
                resultado.innerHTML += `${contador}<br>`
            }
            else{
                resultado.innerHTML += ``
            }
            contador ++;
        }
    }
</script>
</html>
