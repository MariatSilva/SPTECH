<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <label for="">Digite um número (0 a 200)</label>
    <input type="number" id="ipt_num">
    <br>
    <button onclick="analisarNum()">Viva o 7!</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function analisarNum(){
        let contador = 1;
        let num = Number (ipt_num.value);
        resultado.innerHTML = ``;

        while (contador <= num){
            if (num>200 || num < 0){
                resultado.innerHTML = `Digite um número entre 0 e 200`  
            }
            else {
                if (contador % 7 == 0  && num >= 0 && num<=200){
                    resultado.innerHTML += `${contador}<br>`
                }
            }
            contador ++;
        }
    }
</script>
</html>
