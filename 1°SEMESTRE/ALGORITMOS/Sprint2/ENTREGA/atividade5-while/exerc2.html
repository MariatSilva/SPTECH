<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <button onclick="analisarAlgoritmos()">Diga algo sobre a matéria de Algoritmos</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function analisarAlgoritmos(){
        let contador = 1;

        let frase = `Algoritmos é divertido, mas bem difícil.`

        while(contador <=7){
            resultado.innerHTML += `${frase} <br>`;
            contador ++;
        }
    }
</script>
</html>
