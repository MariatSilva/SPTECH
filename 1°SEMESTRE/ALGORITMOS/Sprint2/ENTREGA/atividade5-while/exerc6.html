<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <label for="">Digite um número (20 a 100)</label>
    <input type="number" id="ipt_num">
    <br>
    <button onclick="analisarNum()">Adoro múltiplos de 5</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function analisarNum(){
        let contador = 1;
        let num = Number (ipt_num.value);
        resultado.innerHTML = ``;

        while (contador <= num){
            if (num < 20 || num>100){
                resultado.innerHTML = `Digite um número entre 20 e 100`  
            }
            else {
                if (contador % 5 == 0  && num >= 20 && num<=100){
                    resultado.innerHTML += `${contador}<br>`
                }
            }
            contador ++;
        }
    }
</script>
</html>
