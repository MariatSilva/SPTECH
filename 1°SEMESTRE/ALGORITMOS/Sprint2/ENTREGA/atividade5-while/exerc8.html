<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <label for="">Digite um número:</label>
    <input type="number" id="ipt_num">
    <br>
    <label for="">Digite uma frase:</label>
    <input type="text" id="ipt_frase">
    <br>
    <button onclick="falaPapagaio()">Papagaio</button>
    
</body>
<script>
    function falaPapagaio(){
        let qtdFrase = Number (ipt_num.value);
        let frasePapagaio = (ipt_frase.value);
        let contador = 1;
       

        while(contador <= qtdFrase){
          alert(`contador ${contador}: ${frasePapagaio}`) 
            contador++;
        }
    }
</script>
</html>
