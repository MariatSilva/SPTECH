<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício</title>
</head>
<body>
    <h3>Palpite quais os melhores personagens de Instrumentos Mortais!!</h3>
    <label for="">Digite o seu palpite da 1° posição:</label>
    <input type="text" id="ipt_palpite1">
    <br>
     <label for="">Digite o seu palpite da 2° posição:</label>
    <input type="text" id="ipt_palpite2">
    <br>
     <label for="">Digite o seu palpite da 3° posição:</label>
    <input type="text" id="ipt_palpite3">
    <br>
     <label for="">Digite o seu palpite da 4° posição:</label>
    <input type="text" id="ipt_palpite4">
    <br>
     <label for="">Digite o seu palpite da 5° posição:</label>
    <input type="text" id="ipt_palpite5">
    <br>
    <button onclick="palpite()">Exibir Resultado</button>
    <br>
    <div id="div_resultado"></div>
</body>

<script>
        let nomesOficiais = ["Magnus Bane", "Simon Lovelace", "Isabelly Lightwood", "Clary Fairchaild", "Jace Herondale"]

    function palpite(){ 
        let contador = 0;
        let palpite1 = ipt_palpite1.value;
        let palpite2 = ipt_palpite2.value;
        let palpite3 = ipt_palpite3.value;
        let palpite4 = ipt_palpite4.value;
        let palpite5 = ipt_palpite5.value;



        if(palpite1 == nomesOficiais[0]){
            contador +=1
            div_resultado.innerHTML = `<br><b>1° </b>Acertou Magnus Bane`      
        }else {
            div_resultado.innerHTML = `<br><b>1° </b>Errou Magnus Bane`
        }
        if(  palpite2 == nomesOficiais[1]){
            contador +=1
             div_resultado.innerHTML += `<br><b>2° </b>Acertou Simon Lovelace`      
        }else {
            div_resultado.innerHTML += `<br><b>2° </b>Errou Simon Lovelace`
        }
        if (palpite3 == nomesOficiais[2]){
            contador +=1
             div_resultado.innerHTML += `<br><b>3° </b>Acertou Isabelly Lightwood`      
        }else {
            div_resultado.innerHTML += `<br><b>3° </b>Errou Isabelly Lightwood`
        }
        if( palpite4 == nomesOficiais[3]){
            contador +=1
             div_resultado.innerHTML += `<br><b>4° </b>Acertou Clary Fairchaild`      
        }else {
            div_resultado.innerHTML += `<br><b>4° </b>Errou Clary Fairchaild`
        }
        if( palpite5 == nomesOficiais[4]){
            contador +=1
             div_resultado.innerHTML += `<br><b>5° </b>Acertou Jace Herondale`      
        }else {
            div_resultado.innerHTML += `<br><b>5° </b>Errou Jace Herondale`
        }
        
        div_resultado.innerHTML += `<br><br>
        Você acertou o ranking de ${contador} personagem(ns).
        <br>
        Você errou o raking de ${5 - contador} personagem(ns)
        `

        if (contador>2){
            div_resultado.innerHTML += `<br><br>Você conhece bem essa competição!`
        }else{
            div_resultado.innerHTML += `<br><br>Você precisa acompanhar mais essa competição!`
        }

    }
</script>
</html>
