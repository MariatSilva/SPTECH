<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>

<body>
    <label for="">Digite quantos depósitos você fez:</label>
    <input type="number" id="ipt_qtd_deposito">
    <br>
    <label for="">Digite o valor dos depósitos:</label>
    <input type="number" id="ipt_valor_deposito">
    <br>
    <button onclick="analisarGrana()">Acompanhar grana</button>
    <br><br>
    <div id="div_resultado"></div>
</body>
<script>
    function analisarGrana() {
        div_resultado.innerHTML = ``
        let qtdDeposito = Number(ipt_qtd_deposito.value);
        let valorDeposito = Number(ipt_valor_deposito.value);

        let saldoTotal = 0;

        for (i = 1; i <= qtdDeposito; i++) {
            
            saldoTotal += valorDeposito;

            if (i % 3 == 0) {
                saldoTotal *= 1.01;
                div_resultado.innerHTML += `<br><br>${i}º Mês: R$ ${saldoTotal.toFixed(2)}`
               
            }

            if (i % 3 != 0) {
                div_resultado.innerHTML += `<br><br>${i}º Mês: R$ ${saldoTotal.toFixed(2)}`
                
            }

        }    
         div_resultado.innerHTML += `<br><br> Total guardado ${saldoTotal.toFixed(2)}`


    }
</script>

</html>
