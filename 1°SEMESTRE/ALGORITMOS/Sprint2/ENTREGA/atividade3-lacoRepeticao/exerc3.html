<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <label for="">Quantas Coca-Cola acha que você já bebeu:</label>
    <input type="number" id="ipt_qtd_coca" placeholder="Ex:98">
    <br>
    <button onclick="analisarCocas()">Ver a quantidade</button>
    <br><br>
    <div id="div_resultado"></div>
    
    
</body>
<script>
    function analisarCocas(){
         div_resultado.innerHTML = ``;
        let qtdCoca = Number (ipt_qtd_coca.value);

        for(let i = 1; i <=qtdCoca; i++){
            div_resultado.innerHTML += `🥤`
        }
    }
</script>
</html>
