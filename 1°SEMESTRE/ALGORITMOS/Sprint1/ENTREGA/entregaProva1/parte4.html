<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>Calculadora SPFlix</h1>

  <div>
    <p>Qualidade (720p ou 1080p ou 4K):</p>
    <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>

</html>
<script>




  function exibirResultado() {
    let valorFinal = 0;
   



       let qualidade = (ipt_qualidade.value);
  let precoQualidade = 0;

  if (qualidade == '720p') {
    precoQualidade = 15;

  }else if (qualidade == '1080p'){
      precoQualidade = 20;

  }else  {
      precoQualidade = 25;

  }
 /////////////////////
 


  let qtdTelas = Number (ipt_qtd_telas.value);
  let qtdTelasExtras = Number (ipt_qtd_telas_extras.value);

  let valorTotalTelas = 0;


   
  if (qtdTelas <=2){
    valorTotalTelas = 10;

  }else if (qtdTelas <=4){  
    valorTotalTelas = 20;  

  }else{
    valorTotalTelas = 30;  
  }

  valorTotalTelas += (qtdTelasExtras * 12.9);

  // pt 3

   valorFinal = valorTotalTelas+ precoQualidade;
  let totalPessoas = qtdTelas+ qtdTelasExtras;

/////////////////////
    let totalTelas = qtdTelas + qtdTelasExtras;
    let download = (ipt_download.value);


    let acrescimoPorcentagem = 5 + totalTelas;

    if (download == 'sim') {
      valorFinal = valorTotalTelas + precoQualidade;
      valorFinal += valorFinal * (acrescimoPorcentagem / 100);

      let valorDividido = valorFinal / totalTelas;
      div_mensagem.innerHTML = `O valor base do seu plano é R$${precoQualidade.toFixed(2)}<br>
                              O valor das telas do seu plano é R$${valorTotalTelas.toFixed(2)}<br>
                              Exiba a frase: Você optou por fazer download e por isso sua conta irá subir em ${acrescimoPorcentagem}%<br>
                              Valor final: R$${valorFinal.toFixed(2)}<br>
                              Se quiser dividir fica R$${valorDividido.toFixed(2)}para cada!`
    }

    else {
      let desconto = 10;
      valorFinal = valorTotalTelas + precoQualidade;

      valorFinal = valorFinal * 0.9


      let valorDividido = valorFinal / totalTelas;
      div_mensagem.innerHTML = `O valor base do seu plano é R$${precoQualidade.toFixed(2)}<br>
                              O valor das telas do seu plano é R$${valorTotalTelas.toFixed(2)}<br>
                              Exiba a frase: Você optou por não fazer download e por isso sua conta será reduzida em 10%<br>
                              Valor final: R$${valorFinal.toFixed(2)}<br>
                              Se quiser dividir fica R$${valorDividido.toFixed(2)} para cada!`
    }
  }


</script>
