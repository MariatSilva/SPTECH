<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Altura e Esportes: Descubra Sua Vantagem Competitiva</title>
</head>
<body>
    <label for="id_altura">Digite sua altura:</label>
    <input type="number" id="id_altura" placeholder="Ex: 1.67">
    <br>
    <button onclick="analisarEsporte()">Analisar Estatura</button>

    <div id="resultadoAltura"></div>
</body>

    <script>
        function analisarEsporte(){
            let altura = Number(id_altura.value);

            if(altura<=1.65){
                resultadoAltura.innerHTML = `Você pode ser piloto de corrida`
            }else if (altura <= 1.80){
                resultadoAltura.innerHTML = `Você pode ser jogador de futebol`
            }else {
                resultadoAltura.innerHTML =  `Você pode ser jogador de vôlei ou basquete`
            }
        }
    </script>
</html>
