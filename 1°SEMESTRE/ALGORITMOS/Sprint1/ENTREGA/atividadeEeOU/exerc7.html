<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>

    <label for="ipt_login">Digite seu login:</label>
    <input type="text" id="ipt_login">
    <br>

    <label for="">Digite sua senha:</label>
    <input type="text" id="ipt_senha">
    <br>

    <label for="">Digite sua informação pessoal:</label>
    <input type="text" id="ipt_infoPessoal">
    <br>

    <button onclick="autenticar()">Autenticar</button>
    <br>

    <div id="div_resultado"></div>

</body>
<script>

    contador = 3;

    function autenticar() {

        let login = (ipt_login.value);
        let senha = (ipt_senha.value);
        let infoPessoal = (ipt_infoPessoal.value);


        if (contador == 0) {
            div_resultado.innerHTML = `Usuário BLOQUEADO! Procure seu gerente! `
        }
        else {

            if (contador == 3) {


                if (login == "ana" && senha == "braga" && infoPessoal == "1949" || login == "ana" && senha == "braga" && infoPessoal == "louro josé") {
                    div_resultado.innerHTML = `Usuário autenticado `
                }
                else {
                    contador -= 1;
                    div_resultado.innerHTML = `Falha na autenticação<br>
                    Você ainda tem ${contador} tentativa(s) `
                }
            }
            else if (contador == 2) {


                if (login == "ana" && senha == "braga" && infoPessoal == "1949" || login == "ana" && senha == "braga" && infoPessoal == "louro josé") {
                    contador += 1;
                    div_resultado.innerHTML = `Usuário autenticado`

                } 
                else {
                    contador -= 1;
                    div_resultado.innerHTML = `Falha na autenticação<br>
                    Você ainda tem ${contador} tentativa(s) `
                }

            } else {


                if (login == "ana" && senha == "braga" && infoPessoal == "1949" || login == "ana" && senha == "braga" && infoPessoal == "louro josé") {
                    contador += 2;
                    div_resultado.innerHTML = `Usuário autenticado`
                } 
                else {
                    contador -= 1;
                    div_resultado.innerHTML = `Usuário BLOQUEADO! Procure seu gerente! `

                }
            }

        }

    }
</script>

</html>
