<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 2</title>
</head>
<body>
   <h2>Questão 2</h2>
   
   <span>Quantidade de Energia Consumida (kWh): </span>
   <input type="text" id="input_kwh"> <br>

   <span>Bandeira Tarifária de Energia: </span>
   <input type="text" id="input_bandeira"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>
/* Faça sua lógica aqui! Não altere o HTML. */
function calcular() {
   let kwh = Number (input_kwh.value);
   let bandeira = (input_bandeira.value);
   let valorTotal = 0;

   if (bandeira == `verde`){
      valorTotal = kwh * 0.75;
   }else if (bandeira == `amarela`){
      valorTotal = kwh * 0.90;
   } else {
      valorTotal= kwh * 1.15
   }

   if (kwh <= 100){
      valorTotal -= 15;

      div_mensagem.innerHTML = `Com o consumo de ${kwh} kWh na bandeira ${bandeira}, a conta de energia totaliza R$ ${valorTotal.toFixed(2)}`
   }else {
      div_mensagem.innerHTML = `Com o consumo de ${kwh} kWh na bandeira ${bandeira}, a conta de energia totaliza R$ ${valorTotal.toFixed(2)}`
   }
}
</script>
