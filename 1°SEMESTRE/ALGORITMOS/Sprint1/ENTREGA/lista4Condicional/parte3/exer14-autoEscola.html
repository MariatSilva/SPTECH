<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <label for="">Digite seu nome:</label>
    <input type="text" id="id_nome">
    <br>
    <label for="">Digite sua idade:</label>
    <input type="number" id="id_idade">
    <br>
    <button onclick="analisarAluno()">Avaliar aluno</button>
    <br><br>
    <div id="respostaAutoEscola"></div>
</body>

<script>
    function analisarAluno(){
        let nome =(id_nome.value);
        let idade = Number (id_idade.value);

        if(idade>=18){
            respostaAutoEscola.innerHTML = `${nome}, vamos tirar a CNH?`
        }else{
            respostaAutoEscola.innerHTML = `${nome}, vai jogar PlayStation!`
  
        }
    }
</script>
</html>
