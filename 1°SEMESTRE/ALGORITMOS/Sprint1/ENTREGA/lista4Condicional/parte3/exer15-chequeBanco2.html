<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>
    <label for="">Digite o saldo da sua conta:</label>
    <input type="number" id="id_saldo_conta">
    <br>
    <label for="">Digite o valor do débito:</label>
    <input type="number" id="id_debito_conta">
    <br>
    <button onclick="calcularSaldo()">Analisar conta</button>
    <br><br>
    <div id="respostaBanco"></div>
</body>

<script>
    function calcularSaldo(){
        let saldoConta = Number (id_saldo_conta.value)
        let valorDebito = Number (id_debito_conta.value);

         saldoConta -= valorDebito;

         if(saldoConta<0){
            respostaBanco.innerHTML = `<b style="color:red;">O saldo atual da conta corrente é R$${saldoConta}</b>` 

         }else {
            respostaBanco.innerHTML = `<i style="color:blue;">O saldo atual da conta corrente é R$${saldoConta}</i>` 
         }
    }
</script>
</html>
