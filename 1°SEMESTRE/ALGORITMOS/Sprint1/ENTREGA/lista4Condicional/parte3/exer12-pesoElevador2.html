<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 12</title>
</head>
<body>
    <label for="id_peso_total">Digite o peso total do elevador:</label>
    <input type="number" id="id_peso_total">
    <br>
    <button onclick="analisarPesoElevador()">Ligar elevador</button>

    
</body>

    <script>
        function analisarPesoElevador(){
            let pesoTotal = Number (id_peso_total.value);

            if(pesoTotal< 500){
                alert ('Elevador vai se mover');
            }else {
                alert ('Alguém precisa descer do elevador');
            }
        }
    </script>
</html>
