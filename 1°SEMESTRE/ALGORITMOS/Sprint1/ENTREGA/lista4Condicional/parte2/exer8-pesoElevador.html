<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Peso Médio no Elevador</title>
</head>
<body>
    <label for="id_qtd_homem">Digite quantos homens tem no elevador:</label>
    <input type="number" id="id_qtd_homem">
    <br>
    <label for="id_qtd_mulher">Digite quantas mulheres tem no elevador:</label>
    <input type="number" id="id_qtd_mulher">
    <br>
    <button onclick="calcularPeso()">Analisar peso</button>
    <br><br>
    <div id="respostaElevador"></div>
</body>
    <script>
        function calcularPeso(){
            let qtdHomem = Number(id_qtd_homem.value);
            let qtdMulher = Number(id_qtd_mulher.value);
            let pesoTotal = (qtdHomem * 80) + (qtdMulher * 60);
            respostaElevador.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${pesoTotal}kg.<br>`

            if(pesoTotal > 800){
                respostaElevador.innerHTML += '<div style="color:blue;"> Será necessário que alguém desça para que o elevador se movimente. </div>'
            }
        }

    </script>
</html>
