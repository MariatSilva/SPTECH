<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. Tempo Gasto com Séries</title>
</head>
<body>
    <label for="id_nome_serie">Digite o nome da útima série SITCOM que você assistiu:</label>
    <input type="text" id="id_nome_serie">
    <br>
    <label for="id_qtd_ep">Digite quantos episódios você assistiu no total:</label>
    <input type="number" id="id_qtd_ep">
    <br>
    <button onclick="calcularTempoGasto()">Verificar nível</button>
    <br>
    <div id="respostaTempoGasto"></div>
</body>

    <script>
        function calcularTempoGasto(){
            let nomeSerie = (id_nome_serie.value);
            let qtdEp = Number (id_qtd_ep.value);
            let horasGastas = (qtdEp * 22)/60;
        
            respostaTempoGasto.innerHTML = `Vejo que você gosta da série ${nomeSerie}.<br>`;

            if(horasGastas > 30)
             respostaTempoGasto.innerHTML += `Uau, você realmente gosta dessa série!`
        }
    </script>
</html>
