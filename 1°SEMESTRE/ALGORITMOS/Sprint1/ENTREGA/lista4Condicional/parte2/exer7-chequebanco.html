<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7. Cheque Especial do Banco XPTO  </title>
</head>
<body>
    <label for="id_saldo_conta">Digite o saldo da sua conta:</label>
    <input type="number" id="id_saldo_conta">
    <br>
    <label for="id_valor_debito">Digite seu débito:</label>
    <input type="number" id="id_valor_debito">
    <br>
    <button onclick="calcularDebito()">Analisar conta</button>
    <br>
    <div id="resultadoBanco"></div>

</body>

    <script>          

        function calcularDebito(){
            let valorDebito = Number (id_valor_debito.value);
        let saldoConta = Number (id_saldo_conta.value);

            saldoConta -= valorDebito; 
            resultadoBanco.innerHTML = `O saldo atual da conta corrente é $${saldoConta}`

            if(saldoConta < 0){
                resultadoBanco.innerHTML = `<b style="color:red;">O saldo atual da conta corrente é $${saldoConta}</b>`

            }
        }
    </script>
</html>
