<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Idade para a Festa</title>
</head>
<body>

    <label for="id_idade">Digite sua idade:</label>
    <input type="number" id="id_idade">
    <button onclick="partiuFesta()">Ir para festa</button>

    
</body>

<script>
    function partiuFesta(){
        let idade = Number (id_idade.value);

        if(idade< 18){
            alert ("Pedir permissão pro responsável"); 
            alert ("#partiuFesta");

        }else {
             alert ("#partiuFesta");
        }
    }
</script>
</html>
