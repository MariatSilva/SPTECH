<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21</title>
</head>
<body>
    <label for="id_meta_economia">Digite sua meta de economia:</label>
    <input type="number" id="id_meta_economia">
    <br>
    <label for="id_valor_guardado">Digite quanto você tem guardado:</label>
    <input type="number" id="id_valor_guardado">
    <br>
    <button onclick="calcularEconomia()">Analisar economia</button>
    <br><br>
    <div id="resultadoEconomia"></div>
</body>

    <script>
        function calcularEconomia(){
            let metaEconomia = Number (id_meta_economia.value);
            let valorGuardado = Number (id_valor_guardado.value);
            
            if(valorGuardado>=metaEconomia){
                resultadoEconomia.innerHTML = `Parabéns, meta alcançada!<br>`
                if(valorGuardado>metaEconomia){
                    resultadoEconomia.innerHTML += `Meta ultrapassada em R$${valorGuardado-=metaEconomia}`
                }
            }else{
                resultadoEconomia.innerHTML = ` Força! Ainda em busca da meta! Falta R$${metaEconomia-=valorGuardado}.`
            }

        }
    </script>
</html>
