<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
</head>
<body>
    <label for="id_nota1">Digite a nota 1</label>
    <input type="number" id="id_nota1">
    <br>
    <label for="id_nota2">Digite a nota 2</label>
    <input type="number" id="id_nota2">
    <br>
    <button onclick="calcularMedia()">Verificar situação</button>

</body>

    <script>
        function calcularMedia(){
            let nota1 = Number (id_nota1.value);
            let nota2 = Number (id_nota2.value);
            let media = (nota1 + nota2) / 2;

          if(media>=6){
              alert ('Parabéns, aprovado!')
          }else{
            alert (`Tente outra vez...`)
          }
        }
    </script>
