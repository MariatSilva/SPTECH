<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 20</title>
</head>
<body>
    <label for="id_qtd_homem">Digite a quantidade de homens no elevador:</label>
    <input type="number" id="id_qtd_homem">
    <br>
    <label for="id_qtd_mulher">Digite a quantidade de mulheres no elevador:</label>
    <input type="number" id="id_qtd_mulher">
    <br>
    <button onclick="calcularElevador()">Ligar elevador</button>
    <br><br>
    <div id="resultadoElevador"></div>
</body>
    <script>
        function calcularElevador(){
            let qtdHomem = Number (id_qtd_homem.value);
            let qtdMulher = Number (id_qtd_mulher.value);

            let pesoTotal = (qtdHomem * 90) + (qtdMulher * 70);

            if(pesoTotal<=500){
                resultadoElevador.innerHTML = `<div style="color:green;">Elevador vai se mover, pois está com ${pesoTotal}kg.</div>`
            }else {
                resultadoElevador.innerHTML =`<div style="color:red;">Alguém precisa descer. Precisa perder ${pesoTotal -= 500}kg para mover o elevador. </div>`
            }
        }

    </script>
</html>
