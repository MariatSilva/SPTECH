<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16-Mercado </title>
</head>
<body>
    <label for="id_qtd_chocolates">Digite quantos chocolates você comprou:</label>
    <input type="number" id="id_qtd_chocolates">
    <br>
    <button onclick="calcularChocolate()">Compra</button>
    <br><br>
    <div id="resultadoChocolate"></div>

</body>

    <script>
        function calcularChocolate(){
            let qtdChocolates = Number (id_qtd_chocolates.value);
            let precoChocolates;

            if(qtdChocolates > 12){
                precoChocolates = qtdChocolates * 2.5;

                resultadoChocolate.innerHTML = `O valor da sua compra foi de R$${precoChocolates}`

            }else{
                precoChocolates = qtdChocolates * 3;
                resultadoChocolate.innerHTML = `O valor da sua compra foi de R$${precoChocolates}`
            }


        }
    </script>
</html>
