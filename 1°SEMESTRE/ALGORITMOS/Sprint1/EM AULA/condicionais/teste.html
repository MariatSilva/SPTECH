<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="id_nome" placeholder="Digite seu nome">
    <button onclick="apresentar()">Apresentar</button>

    <p id="id_resultado"></p>
</body>


<script>

    function apresentar() {

        let nome = (id_nome.value)

        id_resultado.innerHTML = `
        Olá ${nome}, bom te ver aqui!!
        `
    }
    
</script>

</html>
